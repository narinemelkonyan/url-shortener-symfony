framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\GenerateShortLinkMessage: async
when@test:
    framework:
        messenger:
            transports:
                async: 'sync://'
